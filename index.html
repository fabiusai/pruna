<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <title>Pruna AI Studio Pro</title>
    <style>
        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; 
            background: #f5f5f7; 
            padding: 20px; 
            max-width: 650px; 
            margin: auto; 
            color: #333;
        }
        .card { 
            background: white; 
            padding: 25px; 
            border-radius: 12px; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.05); 
        }
        h2 { margin-top: 0; margin-bottom: 20px; font-size: 22px; }
        label { font-size: 13px; font-weight: 600; color: #555; display: block; margin-bottom: 5px; }
        input, textarea, select { 
            width: 100%; 
            padding: 12px; 
            margin-bottom: 15px; 
            border: 1px solid #d2d2d7; 
            border-radius: 8px; 
            box-sizing: border-box; 
            font-family: inherit;
        }
        textarea { height: 100px; resize: vertical; white-space: pre-wrap; }
        
        /* Griglia per le impostazioni extra */
        .settings-grid {
            display: flex;
            gap: 15px;
            margin-bottom: 15px;
        }
        .settings-grid > div { flex: 1; }
        
        button { 
            width: 100%; 
            padding: 14px; 
            background: #0071e3; 
            color: white; 
            border: none; 
            border-radius: 8px; 
            font-weight: 600;
            font-size: 15px;
            cursor: pointer; 
            transition: background 0.2s;
        }
        button:hover { background: #005bb5; }
        button:disabled { background: #a1c6ea; cursor: not-allowed; }
        
        .download-btn { background: #34c759; margin-top: 15px; }
        .download-btn:hover { background: #2da94f; }
        
        #res { margin-top: 25px; text-align: center; }
        #res img { max-width: 100%; border-radius: 10px; border: 1px solid #eee; margin-bottom: 10px; }
        #status { color: #0071e3; text-align: center; margin-top: 15px; font-weight: 500; font-size: 14px; min-height: 20px;}
        .error-text { color: #ff3b30 !important; }
    </style>
</head>
<body>
    <div class="card">
        <h2>Pruna AI Studio Pro</h2>
        
        <label for="key">API Key Pruna</label>
        <input type="password" id="key" placeholder="Incolla qui la tua chiave segreta...">
        
        <label for="mode">Modalità di Generazione</label>
        <select id="mode" onchange="updateUI()">
            <option value="generate">Text-to-Image (p-image)</option>
            <option value="edit">Inpainting/Modifica (p-image-edit)</option>
            <option value="upscale">Migliora Risoluzione 4x (p-image-upscale)</option>
        </select>
        
        <div id="imgSec">
            <label for="urls">URL Immagini di Riferimento</label>
            <textarea id="urls" placeholder="Inserisci l'URL dell'immagine (uno per riga).&#10;Es: https://iltuosito.com/foto.jpg"></textarea>
        </div>
        
        <div id="promptSec">
            <label for="prompt">Prompt (Istruzioni di generazione)</label>
            <textarea id="prompt" placeholder="Descrivi dettagliatamente cosa vuoi generare o come vuoi modificare l'immagine..."></textarea>
        </div>

        <div class="settings-grid" id="settingsSec">
            <div>
                <label for="aspectRatio">Proporzioni (Aspect Ratio)</label>
                <select id="aspectRatio">
                    <option value="1:1">1:1 (Quadrato)</option>
                    <option value="16:9">16:9 (Orizzontale)</option>
                    <option value="9:16">9:16 (Verticale)</option>
                    <option value="4:3">4:3 (Classico)</option>
                    <option value="3:4">3:4 (Ritratto)</option>
                    <option value="3:2">3:2 (Fotografia)</option>
                    <option value="2:3">2:3 (Poster)</option>
                </select>
            </div>
            <div>
                <label for="seed">Seed (Opzionale)</label>
                <input type="number" id="seed" placeholder="Es. 42 (Per risultati riproducibili)">
            </div>
        </div>

        <button id="submitBtn" onclick="run()">Avvia Elaborazione</button>
        <div id="status"></div>
        <div id="res"></div>
    </div>

    <script>
        // Mappa delle configurazioni per ciascun modello
        const configs = {
            generate: { model: 'p-image', usePrompt: true, useImages: false, hasSettings: true },
            edit: { model: 'p-image-edit', usePrompt: true, useImages: true, hasSettings: true },
            upscale: { model: 'p-image-upscale', usePrompt: false, useImages: true, hasSettings: false }
        };

        // Aggiorna l'interfaccia in base al modello selezionato
        function updateUI() {
            const mode = document.getElementById('mode').value;
            const conf = configs[mode];
            
            document.getElementById('imgSec').style.display = conf.useImages ? 'block' : 'none';
            document.getElementById('promptSec').style.display = conf.usePrompt ? 'block' : 'none';
            document.getElementById('settingsSec').style.display = conf.hasSettings ? 'flex' : 'none';
        }

        // Forza il download dell'immagine aggirando i blocchi CORS base
        async function downloadImage(url) {
            try {
                const res = await fetch('/.netlify/functions/pruna', {
                    method: 'POST',
                    headers: { 
                        'x-pruna-key': apiKey, 
                        'x-pruna-model': conf.model, 
                        'Content-Type': 'application/json' 
                    },
                    body: JSON.stringify(payload)
                });
                
                const data = await res.json();
                
                // CATTURA TUTTI GLI ERRORI: Pruna usa sia "error" che "message"
                const errorMessage = data.error?.message || data.error || data.message;
                if (errorMessage) throw new Error(errorMessage);
                
                if (data.get_url) {
                    poll(data.get_url, apiKey);
                } else if (data.generation_url) {
                    handleResult(data.generation_url);
                } else {
                    // Se non capiamo la risposta, stampiamo l'intero JSON per fare debug
                    throw new Error("Risposta imprevista: " + JSON.stringify(data));
                }
            } catch(e) { 
                setStatus(`Errore: ${e.message}`, true);
                toggleButton(false);
            }
            }
        }

        // Inizializza l'interfaccia all'avvio
        updateUI();
    </script>
</body>
</html>
