<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pruna AI Studio - Multi Tool</title>
    <style>
        :root {
            --bg-color: #f5f5f7;
            --container-bg: rgba(255, 255, 255, 0.7);
            --border-color: rgba(255, 255, 255, 0.4);
            --text-color: #1d1d1f;
            --accent-color: #0071e3;
            --accent-hover: #0077ed;
            --error-color: #ff3b30;
            --radius: 16px;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "San Francisco", "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            background-image: radial-gradient(circle at 50% -20%, #e2e2e8, #f5f5f7);
            color: var(--text-color);
            max-width: 680px;
            margin: 60px auto;
            padding: 0 20px;
            -webkit-font-smoothing: antialiased;
        }

        .glass-container {
            background: var(--container-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-radius: var(--radius);
            border: 1px solid var(--border-color);
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.05);
            padding: 40px;
        }

        h2 {
            text-align: center;
            font-weight: 600;
            margin-top: 0;
            margin-bottom: 30px;
            letter-spacing: -0.5px;
        }

        label {
            font-weight: 500;
            display: block;
            margin-top: 20px;
            margin-bottom: 8px;
            font-size: 14px;
            color: #515154;
        }

        input[type="password"],
        input[type="url"],
        textarea,
        select {
            width: 100%;
            padding: 14px;
            border: 1px solid #d2d2d7;
            border-radius: 12px;
            box-sizing: border-box;
            background-color: rgba(255, 255, 255, 0.8);
            font-family: inherit;
            font-size: 15px;
            transition: all 0.2s ease;
        }

        select {
            appearance: none;
            cursor: pointer;
        }

        input[type="password"]:focus,
        input[type="url"]:focus,
        textarea:focus,
        select:focus {
            outline: none;
            border-color: var(--accent-color);
            box-shadow: 0 0 0 4px rgba(0, 113, 227, 0.1);
        }

        textarea {
            resize: vertical;
            min-height: 100px;
            line-height: 1.4;
        }

        button {
            width: 100%;
            padding: 16px;
            margin-top: 30px;
            background-color: var(--accent-color);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: background-color 0.2s ease, transform 0.1s ease;
        }

        button:hover {
            background-color: var(--accent-hover);
        }

        button:active {
            transform: scale(0.98);
        }

        #loading {
            text-align: center;
            margin-top: 25px;
            color: var(--accent-color);
            font-weight: 500;
            display: none;
        }

        #result {
            margin-top: 30px;
            text-align: center;
        }

        #result img {
            max-width: 100%;
            border-radius: var(--radius);
            box-shadow: 0 10px 30px rgba(0,0,0,0.15);
            transition: opacity 0.4s ease;
        }

        .error {
            color: var(--error-color);
            font-weight: 500;
            background: rgba(255, 59, 48, 0.1);
            padding: 12px;
            border-radius: 8px;
            word-wrap: break-word;
        }
    </style>
</head>
<body>

    <div class="glass-container">
        <h2>Pruna AI Studio</h2>

        <label for="apiKey">La tua API Key</label>
        <input type="password" id="apiKey" placeholder="Incolla qui la chiave...">

        <label for="actionSelect">Modalità Operativa</label>
        <select id="actionSelect" onchange="aggiornaInterfaccia()">
            <option value="generate">Crea Nuova Immagine (Solo testo)</option>
            <option value="edit">Fotoritocco Guidato (Testo + Immagine)</option>
            <option value="upscale">Migliora Risoluzione 4x (Solo Immagine)</option>
        </select>

        <div id="promptGroup">
            <label for="prompt">Prompt Descrittivo</label>
            <textarea id="prompt" rows="4">Japanese girl Hero smiles, wears a kimono, serves japanese tea to the viewer, same artistic style</textarea>
        </div>

        <div id="imageGroup" style="display: none;">
            <label for="imageUrl">URL Immagine Base (Link Diretto Pubblico)</label>
            <input type="url" id="imageUrl" placeholder="Es: https://hash.cloud/hero.jpeg">
        </div>

        <button onclick="eseguiAzione()">Elabora</button>

        <div id="loading">Elaborazione in corso tramite Netlify, attendi...</div>
        
        <div id="result"></div>
    </div>

    <script>
        // Mostra o nascondi i campi in base alla modalità scelta
        function aggiornaInterfaccia() {
            const action = document.getElementById('actionSelect').value;
            document.getElementById('promptGroup').style.display = (action === 'upscale') ? 'none' : 'block';
            document.getElementById('imageGroup').style.display = (action === 'generate') ? 'none' : 'block';
        }

        async function eseguiAzione() {
            const apiKey = document.getElementById('apiKey').value.trim();
            const action = document.getElementById('actionSelect').value;
            const promptTesto = document.getElementById('prompt').value.trim();
            const imageUrl = document.getElementById('imageUrl').value.trim();
            const loadingDiv = document.getElementById('loading');
            const resultDiv = document.getElementById('result');

            if (!apiKey) {
                alert("Per favore, inserisci la tua API Key.");
                return;
            }

            loadingDiv.style.display = 'block';
            resultDiv.innerHTML = '';

            const endpoint = '/.netlify/functions/pruna';
            let prunaModel = '';
            let payload = { input: {} };

            // Logica di instradamento in base alla tendina
            try {
                if (action === 'generate') {
                    prunaModel = 'p-image';
                    payload.input.prompt = promptTesto;
                    payload.input.aspect_ratio = "1:1";
                } 
                else if (action === 'edit') {
                    prunaModel = 'p-image-edit';
                    payload.input.prompt = promptTesto;
                    if (imageUrl) {
                        payload.input.image = imageUrl; 
                    } else {
                        throw new Error("Per il fotoritocco devi inserire un URL valido!");
                    }
                } 
                else if (action === 'upscale') {
                    prunaModel = 'p-image-upscale';
                    if (imageUrl) {
                        // Passiamo solo l'URL dell'immagine, senza parametri matematici
                        payload.input.image = imageUrl; 
                    } else {
                        throw new Error("Per l'upscale devi inserire un URL valido!");
                    }
                }
                    }
                }

                // Chiamata ultra-leggera verso Netlify
                const response = await fetch(endpoint, {
                    method: 'POST',
                    headers: {
                        'x-pruna-key': apiKey,
                        'x-pruna-model': prunaModel,
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(payload)
                });

                if (!response.ok) {
                    const errorText = await response.text();
                    throw new Error(`Errore HTTP: ${response.status} - ${errorText}`);
                }

                const data = await response.json();
                console.log("Risposta API:", data);

                if (data.status === "succeeded" && data.generation_url) {
                    const finalImageUrl = data.generation_url.startsWith('http') 
                        ? data.generation_url 
                        : `https://api.pruna.ai${data.generation_url}`;
                    resultDiv.innerHTML = `<img src="${finalImageUrl}" alt="Immagine Generata" onload="this.style.opacity=1" style="opacity:0;">`;
                } else if (data.status) {
                    resultDiv.innerHTML = `<p>Stato elaborazione: <strong>${data.status}</strong>. Controlla la console.</p>`;
                } else {
                    resultDiv.innerHTML = `<p class="error">Formato di risposta sconosciuto, guarda la console per i dettagli.</p>`;
                }

            } catch (error) {
                console.error("Errore:", error);
                resultDiv.innerHTML = `<p class="error">${error.message}</p>`;
            } finally {
                loadingDiv.style.display = 'none';
            }
        }

        // Inizializza l'interfaccia corretta al caricamento
        aggiornaInterfaccia();
    </script>
</body>
</html>
