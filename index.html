<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pruna AI Studio - Multi Tool Pro</title>
    <style>
        :root {
            --bg-color: #f5f5f7;
            --container-bg: rgba(255, 255, 255, 0.7);
            --border-color: rgba(255, 255, 255, 0.4);
            --text-color: #1d1d1f;
            --accent-color: #0071e3;
            --accent-hover: #0077ed;
            --error-color: #ff3b30;
            --radius: 16px;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "San Francisco", "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            background-image: radial-gradient(circle at 50% -20%, #e2e2e8, #f5f5f7);
            color: var(--text-color);
            max-width: 680px;
            margin: 60px auto;
            padding: 0 20px;
            -webkit-font-smoothing: antialiased;
        }

        .glass-container {
            background: var(--container-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-radius: var(--radius);
            border: 1px solid var(--border-color);
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.05);
            padding: 40px;
        }

        h2 {
            text-align: center;
            font-weight: 600;
            margin-top: 0;
            margin-bottom: 30px;
            letter-spacing: -0.5px;
        }

        label {
            font-weight: 500;
            display: block;
            margin-top: 20px;
            margin-bottom: 8px;
            font-size: 14px;
            color: #515154;
        }

        input[type="password"],
        input[type="number"],
        textarea,
        select {
            width: 100%;
            padding: 14px;
            border: 1px solid #d2d2d7;
            border-radius: 12px;
            box-sizing: border-box;
            background-color: rgba(255, 255, 255, 0.8);
            font-family: inherit;
            font-size: 15px;
            transition: all 0.2s ease;
        }

        select {
            appearance: none;
            cursor: pointer;
        }

        input[type="password"]:focus,
        input[type="number"]:focus,
        textarea:focus,
        select:focus {
            outline: none;
            border-color: var(--accent-color);
            box-shadow: 0 0 0 4px rgba(0, 113, 227, 0.1);
        }

        textarea {
            resize: vertical;
            line-height: 1.4;
        }

        button {
            width: 100%;
            padding: 16px;
            margin-top: 30px;
            background-color: var(--accent-color);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: background-color 0.2s ease, transform 0.1s ease;
        }

        button:hover {
            background-color: var(--accent-hover);
        }

        button:active {
            transform: scale(0.98);
        }

        #loading {
            text-align: center;
            margin-top: 25px;
            color: var(--accent-color);
            font-weight: 500;
            display: none;
        }

        #result {
            margin-top: 30px;
            text-align: center;
        }

        #result img {
            max-width: 100%;
            border-radius: var(--radius);
            box-shadow: 0 10px 30px rgba(0,0,0,0.15);
            transition: opacity 0.4s ease;
        }

        .error {
            color: var(--error-color);
            font-weight: 500;
            background: rgba(255, 59, 48, 0.1);
            padding: 12px;
            border-radius: 8px;
            word-wrap: break-word;
        }
        
        .flex-group {
            display: flex;
            gap: 15px;
            margin-top: 5px;
        }
        .flex-item {
            flex: 1;
        }
    </style>
</head>
<body>

    <div class="glass-container">
        <h2>Pruna AI Studio Pro</h2>

        <label for="apiKey">La tua API Key</label>
        <input type="password" id="apiKey" placeholder="Incolla qui la chiave...">

        <label for="actionSelect">Modalità Operativa</label>
        <select id="actionSelect" onchange="aggiornaInterfaccia()">
            <option value="generate">Crea Nuova Immagine (Solo testo)</option>
            <option value="edit">Fotoritocco o Clone Volto (Testo + Immagini)</option>
            <option value="upscale">Migliora Risoluzione 4x (Solo Immagine)</option>
        </select>

        <div id="promptGroup">
            <label for="prompt">Prompt Descrittivo</label>
            <textarea id="prompt" rows="4">A cinematic portrait of this person as a futuristic cyberpunk hacker...</textarea>
        </div>

        <div id="settingsGroup" class="flex-group">
            <div class="flex-item">
                <label for="aspectRatio">Formato</label>
                <select id="aspectRatio">
                    <option value="1:1">1:1 (Quadrato)</option>
                    <option value="16:9">16:9 (Orizzontale)</option>
                    <option value="9:16">9:16 (Reel/Story)</option>
                    <option value="4:3">4:3 (Classico)</option>
                    <option value="3:4">3:4 (Verticale)</option>
                </select>
            </div>
            <div class="flex-item">
                <label for="seed">Seed (Opzionale)</label>
                <input type="number" id="seed" placeholder="Es. 42">
            </div>
        </div>

        <div id="imageGroup" style="display: none;">
            <label for="imageUrls">URL Immagini (Incolla un link diretto per riga)</label>
            <textarea id="imageUrls" rows="3" placeholder="https://tuoserver.com/foto1.jpg&#10;https://tuoserver.com/foto2.jpg"></textarea>
        </div>

        <button onclick="eseguiAzione()">Elabora</button>

        <div id="loading">Comunicazione con Pruna in corso...</div>
        
        <div id="result"></div>
    </div>

    <script>
        function aggiornaInterfaccia() {
            const action = document.getElementById('actionSelect').value;
            document.getElementById('promptGroup').style.display = (action === 'upscale') ? 'none' : 'block';
            document.getElementById('settingsGroup').style.display = (action === 'upscale') ? 'none' : 'flex';
            document.getElementById('imageGroup').style.display = (action === 'generate') ? 'none' : 'block';
        }

        async function eseguiAzione() {
            const apiKey = document.getElementById('apiKey').value.trim();
            const action = document.getElementById('actionSelect').value;
            const promptTesto = document.getElementById('prompt').value.trim();
            const imageUrlsRaw = document.getElementById('imageUrls').value;
            const aspectRatio = document.getElementById('aspectRatio').value;
            const seedVal = document.getElementById('seed').value.trim();
            
            const loadingDiv = document.getElementById('loading');
            const resultDiv = document.getElementById('result');

            if (!apiKey) {
                alert("Per favore, inserisci la tua API Key.");
                return;
            }

            loadingDiv.style.display = 'block';
            resultDiv.innerHTML = '';

            const endpoint = '/.netlify/functions/pruna';
            let prunaModel = '';
            let payload = { input: {} };

            // Pulisce e separa gli URL multipli in un Array
            const urlsArray = imageUrlsRaw.split('\n').map(u => u.trim()).filter(u => u !== '');

            try {
                if (action === 'generate') {
                    prunaModel = 'p-image';
                    payload.input.prompt = promptTesto;
                    payload.input.aspect_ratio = aspectRatio;
                    if (seedVal) payload.input.seed = parseInt(seedVal);
                } 
                else if (action === 'edit') {
                    prunaModel = 'p-image-edit';
                    payload.input.prompt = promptTesto;
                    payload.input.aspect_ratio = aspectRatio;
                    if (seedVal) payload.input.seed = parseInt(seedVal);
                    
                    if (urlsArray.length > 0) {
                        payload.input.images = urlsArray; // Array di immagini multiple per coerenza del volto
                    } else {
                        throw new Error("Devi inserire almeno un URL di un'immagine!");
                    }
                } 
                else if (action === 'upscale') {
                    prunaModel = 'p-image-upscale';
                    if (urlsArray.length > 0) {
                        payload.input.image = urlsArray[0]; // Upscale accetta solo la prima immagine
                    } else {
                        throw new Error("Devi inserire l'URL di un'immagine da ingrandire!");
                    }
                }

                // Chiamata Iniziale
                const response = await fetch(endpoint, {
                    method: 'POST',
                    headers: {
                        'x-pruna-key': apiKey,
                        'x-pruna-model': prunaModel,
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(payload)
                });

                if (!response.ok) {
                    const errorText = await response.text();
                    throw new Error(`Errore HTTP: ${response.status} - ${errorText}`);
                }

                const data = await response.json();
                
                // Se la risposta contiene una coda asincrona (il normale comportamento dei modelli pesanti)
                if (data.status === "starting" || data.status === "processing" || data.get_url) {
                    resultDiv.innerHTML = `<p style="color: #0071e3; font-weight: 500;">Generazione in background avviata... non chiudere la pagina.</p>`;
                    controllaStato(data.get_url, apiKey, endpoint, resultDiv, loadingDiv);
                } 
                // Se l'immagine è già pronta all'istante
                else if (data.status === "succeeded" && data.generation_url) {
                    mostraImmagine(data.generation_url, resultDiv);
                    loadingDiv.style.display = 'none';
                } 
                else {
                    throw new Error("Stato imprevisto: " + JSON.stringify(data));
                }

            } catch (error) {
                console.error("Errore:", error);
                resultDiv.innerHTML = `<p class="error">${error.message}</p>`;
                loadingDiv.style.display = 'none';
            }
        }

        // Funzione ricorsiva di Polling (interroga Netlify ogni 3 secondi)
        async function controllaStato(jobUrl, apiKey, endpoint, resultDiv, loadingDiv) {
            try {
                const response = await fetch(endpoint, {
                    method: 'POST',
                    headers: {
                        'x-pruna-key': apiKey,
                        'x-pruna-check-url': jobUrl // Questo dice al proxy di fare una GET a Pruna
                    }
                });

                const data = await response.json();

                if (data.status === 'succeeded' && data.generation_url) {
                    mostraImmagine(data.generation_url, resultDiv);
                    loadingDiv.style.display = 'none';
                } else if (data.status === 'failed') {
                    resultDiv.innerHTML = `<p class="error">L'elaborazione è fallita sui server di Pruna.</p>`;
                    loadingDiv.style.display = 'none';
                } else {
                    // Se sta ancora elaborando, aspetta 3 secondi e riprova
                    resultDiv.innerHTML = `<p style="color: #e67e22; font-weight: 500;">Stato: <strong>${data.status.toUpperCase()}</strong> - Attendere prego...</p>`;
                    setTimeout(() => controllaStato(jobUrl, apiKey, endpoint, resultDiv, loadingDiv), 3000);
                }
            } catch (error) {
                console.error("Errore nel polling:", error);
                resultDiv.innerHTML = `<p class="error">Errore di rete durante il controllo dello stato.</p>`;
                loadingDiv.style.display = 'none';
            }
        }

        function mostraImmagine(url, div) {
            const finalImageUrl = url.startsWith('http') ? url : `https://api.pruna.ai${url}`;
            div.innerHTML = `<img src="${finalImageUrl}" alt="Immagine Generata" onload="this.style.opacity=1" style="opacity:0;">`;
        }

        // Inizializzazione
        aggiornaInterfaccia();
    </script>
</body>
</html>
